name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege default: jobs that need write access declare it explicitly.
permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.0.0
      - run: uv sync --extra dev
      # Run all hooks directly via uv so pre-commit uses the same
      # environment as the rest of the job — no PATH gymnastics needed.
      - run: uv run pre-commit run --all-files

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      # setup-uv installs both uv and the requested Python version —
      # no separate actions/setup-python step needed.
      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev
      - run: uv run pytest --junitxml=junit.xml
      # Upload results only on failure so passing runs stay artifact-free.
      # Artifact names are unique per cell — v4+ artifacts are immutable
      # per run and hard-fail on name collisions.
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: junit.xml
